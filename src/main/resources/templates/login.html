<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connexion / Inscription</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            display: flex;
            justify-content: space-around;
            padding: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-box {
            background: #f4f4f9;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        .auth-box h2 { color: #333; margin-bottom: 20px; }
        .auth-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .auth-box button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .auth-box button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <h2>Connexion</h2>
        <form th:action="@{/hello/login}" method="post">
            <input type="text" name="login" placeholder="Nom d'utilisateur" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
    </div>

    <div class="auth-box">
        <h2>Créer un compte</h2>
        <form th:action="@{/hello/register}" method="post">
            <input type="text" name="login" placeholder="Choisir un pseudo" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit" style="background-color: #2196F3;">S'inscrire</button>
        </form>
    </div>
</div>

</body>
</html>
