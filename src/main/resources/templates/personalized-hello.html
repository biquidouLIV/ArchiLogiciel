<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personnages</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <p>Vos personnages</p>
    </header>

    <h2 id="loggedin">ANONYMOUS</h2>

    <!-- Section qui change selon l'état -->
    <div id="action-area">
        <!-- JS injectera le bouton ici -->
    </div>


    <div class="ListePersos">
        <li th:each="perso : ${personnages}">
            name  : <span th:text="${perso.name}"></span>
            | level : <span th:text="${perso.level}"></span>
            | classe : <span th:text="${perso.classe}"></span>
            | race : <span th:text="${perso.race}"></span>
            <a th:href="@{/hello/details/{index}(index=${personnages.indexOf(perso)})}" class="DetailPersoButton">+</a>
            <a th:href="@{/hello/delete/{index}(index=${personnages.indexOf(perso)})}" class="DetailPersoButton">x</a>
        </li>
        <li class="AddPersoLigne">
            <a th:href="@{/hello/create}" class="AddPerso">Ajouter un personnage</a>
        </li>
    </div>
    <footer>
        <p>Fin de vos personnages</p>
    </footer>
</body>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let cookies = document.cookie.split(';');
            let userLogin = null;

            cookies.forEach(cookie => {
                if (cookie.trim().startsWith("status=")) {
                    userLogin = cookie.split('=')[1];
                }
            });

            if (userLogin) {
                // Si loggé : on affiche le nom et le bouton de création[cite: 1]
                document.getElementById("loggedin").innerText = "Connecté en tant que : " + userLogin;
                document.getElementById("action-area").innerHTML = '<a href="/creer">Créer un personnage</a>';
            } else {
                // Si anonyme : on affiche les liens de connexion[cite: 1]
                document.getElementById("action-area").innerHTML =
                    '<a href="/login">Se connecter</a> ou <a href="/register">S\'inscrire</a>';
            }
        });
    </script>
</html>
