<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personnages</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #333; color: white;">
    <div class="logo">
        <a th:href="@{/hello/home}" style="color: white; text-decoration: none; font-weight: bold;">Personnages</a>
    </div>

    <div class="user-menu">
        <th:block th:if="${status == null or status == 'anonymous'}">
            <a th:href="@{/hello/login}"
               style="background: #4CAF50; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none;">
                Connexion / Inscription
            </a>
        </th:block>

        <th:block th:if="${status != null and status != 'anonymous'}">
            Bienvenue, <b th:text="${status}">Utilisateur</b> !
            <a th:href="@{/hello/logout}" style="color: #ff4c4c; margin-left: 15px;">Déconnexion</a>
        </th:block>
    </div>
</header>

    <div class="ListePersos">
        <li th:each="perso : ${personnages}">
            name  : <span th:text="${perso.name}"></span>
            | level : <span th:text="${perso.level}"></span>
            | classe : <span th:text="${perso.classe}"></span>
            | race : <span th:text="${perso.race}"></span>
            <a th:href="@{/hello/details/{id}(id=${perso.id})}" class="DetailPersoButton">+</a>
            <a th:href="@{/hello/delete/{id}(id=${perso.id})}" class="DetailPersoButton">x</a>
        </li>
        <li class="AddPersoLigne">
            <a th:href="@{/hello/create}" class="AddPerso">Ajouter un personnage</a>
        </li>
    </div>
    <footer>
        <p>Fin de vos personnages</p>
    </footer>
</body>
</html>
