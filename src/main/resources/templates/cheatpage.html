<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cheat Page</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header><p>cheat page</p></header>
<main class="detailsPerso">
    <form th:action="@{/hello/cheatpage/{id}(id=${perso.id})}" method="post">
        <div class="CreaPersoForm">
            <label>Nom</label>
            <input type="text" name="name" th:value="${perso.name}">
        </div>
        <div class="CreaPersoForm">
            <label>Niveau</label>
            <input type="number" name="level" th:value="${perso.level}">
        </div>
        <div class="CreaPersoForm">
            <label>Classe</label>
            <select name="classe">
                <option value="Sorcier"    th:selected="${perso.classe == 'Sorcier'}">Sorcier</option>
                <option value="Chevalier"  th:selected="${perso.classe == 'Chevalier'}">Chevalier</option>
                <option value="Archer"     th:selected="${perso.classe == 'Archer'}">Archer</option>
                <option value="Occultiste" th:selected="${perso.classe == 'Occultiste'}">Occultiste</option>
                <option value="Paladin"    th:selected="${perso.classe == 'Paladin'}">Paladin</option>
                <option value="Ménestrel"  th:selected="${perso.classe == 'Ménestrel'}">Ménestrel</option>
            </select>
        </div>
        <div class="CreaPersoForm">
            <label>Race</label>
            <select name="race">
                <option value="Orc"     th:selected="${perso.race == 'Orc'}">Orc</option>
                <option value="Elfe"    th:selected="${perso.race == 'Elfe'}">Elfe</option>
                <option value="Elfelin" th:selected="${perso.race == 'Elfelin'}">Elfelin</option>
                <option value="Nain"    th:selected="${perso.race == 'Nain'}">Nain</option>
                <option value="Hobbit"  th:selected="${perso.race == 'Hobbit'}">Hobbit</option>
                <option value="Gobelin" th:selected="${perso.race == 'Gobelin'}">Gobelin</option>
            </select>
        </div>
        <div class="CreaPersoForm">
            <label>Force</label>
            <input type="number" name="force" th:value="${perso.force}">
        </div>
        <div class="CreaPersoForm">
            <label>Agilité</label>
            <input type="number" name="agilite" th:value="${perso.agilite}">
        </div>
        <div class="CreaPersoForm">
            <label>Endurance</label>
            <input type="number" name="endurance" th:value="${perso.endurance}">
        </div>
        <div class="CreaPersoForm">
            <label>Rapidité</label>
            <input type="number" name="rapidite" th:value="${perso.rapidite}">
        </div>
        <div class="CreaPersoForm">
            <label>Intelligence</label>
            <input type="number" name="intelligence" th:value="${perso.intelligence}">
        </div>
        <div class="CreaPersoForm">
            <label>Chance</label>
            <input type="number" name="chance" th:value="${perso.chance}">
        </div>
        <div class="CreaPersoForm">
            <label>Charisme</label>
            <input type="number" name="charisme" th:value="${perso.charisme}">
        </div>
        <div class="CreaPersoButton">
            <a th:href="@{/hello/details/{id}(id=${perso.id})}">Annuler</a>
            <button type="submit">Enregistrer</button>
        </div>
    </form>
</main>
<footer></footer>
</body>
</html>
